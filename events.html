<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women of Purpose | Events</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat', sans-serif;
    background:#ffffff;
    color:#2d1247;
    overflow-x:hidden;
}

.wrapper{
    width:100%;
    min-height:100vh;
    position:relative;
}

.top-shape{
    position:absolute;
    top:0;
    left:0;
    width:340px;
    height:230px;
    background:linear-gradient(135deg,#3e0d68,#6f2da8);
    border-bottom-right-radius:220px;
    z-index:0;
}

.gold-splash{
    position:absolute;
    top:0;
    right:0;
    width:320px;
    height:220px;
    background:linear-gradient(135deg,#f7e49a,#c79b2a);
    clip-path:polygon(28% 0%,100% 0%,100% 100%,0% 55%);
    opacity:.85;
    z-index:0;
}

header{
    text-align:center;
    padding:28px 20px 10px;
    position:relative;
    z-index:5;
}

header img{
    width:145px;
}

header h1{
    font-family:'Cinzel', serif;
    font-size:52px;
    line-height:1;
    color:#341052;
    margin-top:8px;
}

header h1 span{
    font-size:34px;
    font-weight:400;
}

.nav-buttons{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:18px;
    padding:20px;
    position:relative;
    z-index:5;
}

.nav-buttons a{
    text-decoration:none;
    min-width:180px;
    padding:14px 26px;
    border-radius:50px;
    background:#f4dd8a;
    border:2px solid #c89b2d;
    color:#341052;
    font-weight:700;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    transition:.3s ease;
}

.nav-buttons a:hover{
    background:#4b1770;
    color:#fff;
    border-color:#4b1770;
    transform:translateY(-3px);
}

.events-section{
    position:relative;
    z-index:5;
    padding:40px 20px 70px;
    text-align:center;
}

.events-title{
    font-family:'Cinzel', serif;
    font-size:48px;
    color:#341052;
    margin-bottom:10px;
}

.events-subtitle{
    font-size:20px;
    color:#5a476d;
    margin-bottom:40px;
}

.carousel-wrapper{
    max-width:1200px;
    margin:0 auto;
    position:relative;
    overflow:hidden;
    padding:10px 50px 30px;
}

.carousel-track{
    display:flex;
    transition:transform 0.6s ease-in-out;
}

.event-slide{
    min-width:25%;
    padding:10px 15px;
    display:flex;
    justify-content:center;
}

.event-box{
    text-align:center;
    width:100%;
}

.event-circle{
    width:240px;
    height:240px;
    margin:0 auto;
    border-radius:50%;
    overflow:hidden;
    border:6px solid #c89b2d;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
}

.event-circle img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.placeholder{
    background:linear-gradient(135deg,#4b1770,#7b2cbf);
    color:#fff;
    font-weight:700;
    font-size:20px;
    line-height:1.4;
    padding:20px;
    text-align:center;
}

.event-box h3{
    margin-top:16px;
    font-size:19px;
    color:#341052;
}

.carousel-btn{
    position:absolute;
    top:45%;
    transform:translateY(-50%);
    width:46px;
    height:46px;
    border:none;
    border-radius:50%;
    background:#4b1770;
    color:#fff;
    font-size:20px;
    cursor:pointer;
    z-index:10;
    box-shadow:0 8px 18px rgba(0,0,0,.18);
    transition:.3s ease;
}

.carousel-btn:hover{
    background:#c89b2d;
    color:#341052;
}

.carousel-btn.prev{
    left:0;
}

.carousel-btn.next{
    right:0;
}

.carousel-dots{
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:10px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#d7c8e6;
    cursor:pointer;
    transition:.3s ease;
}

.dot.active{
    background:#4b1770;
}

footer{
    background:linear-gradient(135deg,#2d0947,#4d1773);
    color:#fff;
    text-align:center;
    padding:46px 20px 35px;
    border-top:5px solid #c89b2d;
    position:relative;
    z-index:5;
}

footer h3{
    font-family:'Cinzel', serif;
    color:#e7c86f;
    font-size:32px;
    margin-bottom:18px;
}

.motto{
    font-size:34px;
    margin-bottom:28px;
}

.contact{
    font-size:34px;
    margin-bottom:24px;
}

.contact i{
    color:#25D366;
    margin-right:10px;
}

.socials{
    display:flex;
    justify-content:center;
    gap:22px;
    flex-wrap:wrap;
}

.socials a{
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid #e7c86f;
    color:#e7c86f;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    font-size:24px;
    transition:.3s;
}

.socials a:hover{
    background:#e7c86f;
    color:#341052;
}

@media(max-width:1100px){
    .event-slide{
        min-width:50%;
    }

    .events-title{
        font-size:40px;
    }

    .motto{
        font-size:24px;
    }

    .contact{
        font-size:28px;
    }
}

@media(max-width:700px){
    header h1{
        font-size:38px;
    }

    header h1 span{
        font-size:24px;
    }

    .nav-buttons a{
        min-width:150px;
        padding:12px 16px;
        font-size:14px;
    }

    .events-title{
        font-size:30px;
    }

    .events-subtitle{
        font-size:16px;
    }

    .carousel-wrapper{
        padding:10px 40px 30px;
    }

    .event-slide{
        min-width:100%;
    }

    .event-circle{
        width:220px;
        height:220px;
    }

    .motto{
        font-size:22px;
    }

    .contact{
        font-size:22px;
    }
}
</style>

</head>
<body>

<div class="top-shape"></div>

<script>
const track = document.getElementById('carouselTrack');
const dots = document.querySelectorAll('.dot');
const slides = document.querySelectorAll('.event-slide');

let currentIndex = 0;
let autoSlide;

function getVisibleSlides() {
    if (window.innerWidth <= 700) return 1;
    if (window.innerWidth <= 1100) return 2;
    return 4;
}

function updateCarousel() {
    const visibleSlides = getVisibleSlides();
    const maxIndex = Math.max(slides.length - visibleSlides, 0);

    if (currentIndex > maxIndex) {
        currentIndex = 0;
    }

    const slideWidth = slides[0].offsetWidth;
    track.style.transform = `translateX(-${currentIndex * slideWidth}px)`;

    dots.forEach(dot => dot.classList.remove('active'));
    if (dots[currentIndex]) {
        dots[currentIndex].classList.add('active');
    }
}

function moveSlide(direction) {
    const visibleSlides = getVisibleSlides();
    const maxIndex = Math.max(slides.length - visibleSlides, 0);

    currentIndex += direction;

    if (currentIndex > maxIndex) {
        currentIndex = 0;
    }

    if (currentIndex < 0) {
        currentIndex = maxIndex;
    }

    updateCarousel();
    resetAutoSlide();
}

function goToSlide(index) {
    const visibleSlides = getVisibleSlides();
    const maxIndex = Math.max(slides.length - visibleSlides, 0);

    currentIndex = Math.min(index, maxIndex);
    updateCarousel();
    resetAutoSlide();
}

function startAutoSlide() {
    autoSlide = setInterval(() => {
        moveSlide(1);
    }, 4000);
}

function resetAutoSlide() {
    clearInterval(autoSlide);
    startAutoSlide();
}

window.addEventListener('resize', updateCarousel);

updateCarousel();
startAutoSlide();
</script>

</body>
